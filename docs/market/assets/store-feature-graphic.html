<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>امدادیار</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 42px;
        align-items: center;
        padding: 48px 58px;
        color: #12212b;
        background: #f4f7f6;
        font-family: Tahoma, Arial, sans-serif;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.32;
        background-image:
          linear-gradient(#dce8e8 1px, transparent 1px),
          linear-gradient(90deg, #dce8e8 1px, transparent 1px);
        background-size: 44px 44px;
      }
      .copy, .result { position: relative; z-index: 1; }
      .brand { display: flex; align-items: center; gap: 22px; }
      .brand img { width: 112px; height: 112px; }
      h1 { margin: 0; color: #064e5f; font-size: 68px; line-height: 1; }
      .lead { margin: 28px 0 24px; font-size: 29px; font-weight: 800; }
      .tags { display: flex; gap: 10px; flex-wrap: wrap; }
      .tags span {
        border: 1px solid #bdd9d8;
        border-radius: 7px;
        padding: 10px 16px;
        color: #064e5f;
        background: #fff;
        font-size: 19px;
        font-weight: 800;
      }
      .note { margin: 25px 0 0; color: #64727c; font-size: 17px; }
      .result {
        border: 1px solid #efbcbc;
        border-radius: 8px;
        padding: 24px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(27, 51, 62, 0.13);
      }
      .result-head { color: #087f8c; font-size: 18px; font-weight: 800; }
      .priority { display: flex; align-items: center; gap: 18px; margin: 18px 0; }
      .ring {
        display: grid;
        place-items: center;
        width: 104px;
        height: 104px;
        flex: 0 0 auto;
        border: 13px solid #c43b3b;
        border-radius: 50%;
        color: #12212b;
        font-size: 27px;
        font-weight: 900;
      }
      .priority strong { display: block; font-size: 28px; }
      .priority small { display: block; margin-top: 7px; color: #657580; font-size: 17px; }
      .rule {
        border-right: 5px solid #157a55;
        padding: 10px 14px;
        color: #42515b;
        background: #f2f9f6;
        font-size: 17px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <section class="copy">
      <div class="brand">
        <img src="../release/Emdadyar-store-icon-512.png" alt="" />
        <h1>امدادیار</h1>
      </div>
      <p class="lead">ارزیابی اولیه، تصمیم انسانی</p>
      <div class="tags">
        <span>آفلاین</span>
        <span>فارسی</span>
        <span>ورودی ناقص</span>
        <span>قانون ایمنی</span>
      </div>
      <p class="note">نسخه آزمایشی و آموزشی؛ پشتیبان تصمیم، نه جایگزین متخصص</p>
    </section>
    <section class="result">
      <div class="result-head">نتیجه روشن در شرایط پرفشار</div>
      <div class="priority">
        <div class="ring">فوری</div>
        <div>
          <strong>رسیدگی فوری</strong>
          <small>اولویت یک برای بررسی انسانی</small>
        </div>
      </div>
      <div class="rule">علائم حیاتی شدید جدا از درصد مدل برجسته می‌شوند.</div>
    </section>
  </body>
</html>
